name: Auto Generate Documentation

on:
  push:
    branches: [main]
    paths: ['*.json', '*.json5']
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Documentation
        run: |
          # Create a comprehensive README
          cat > README.md << 'EOF'
          # 🔧 Renovate Configuration Presets

          This repository contains shared Renovate configuration presets for consistent dependency management across projects.

          ## 🚀 Quick Start

          To get started with these presets, simply include them in your Renovate configuration.

          Add to your `renovate.json`:
          ```json
          {
            "extends": ["github>trowaflo/renovate-config"]
          }
          ```

          ## 📦 Available Presets

          EOF

          # Generate documentation for each preset
          for file in *.json *.json5; do
            if [[ -f "$file" && "$file" != "renovate.json" ]]; then
              name=$(basename "$file" | sed 's/\.[^.]*$//')
              {
                echo "### 🎯 $name"
                echo ""
                echo "\`\`\`json"
                echo "\"extends\": [\"github>trowaflo/renovate-config:$file\"]"
                echo "\`\`\`"
                echo ""
              } >> README.md
            fi
          done

          cat >> README.md << 'EOF'
          ## 📋 Preset Details

          EOF

          {
            echo "| Preset | Purpose | Auto-merge | Labels |"
            echo "|--------|---------|------------|--------|"
          } >> README.md

          for file in *.json5; do
            if [[ -f "$file" ]]; then
              name=$(basename "$file" .json5)
              automerge=$(grep -o '"automerge": true' "$file" | wc -l | tr -d ' ')
              labels=$(grep -o '"labels": \[[^]]*\]' "$file" | head -1 | sed 's/"labels": \[\([^]]*\)\]/\1/' | tr -d '"')
              purpose=$(echo "$name" | sed 's/_/ /g' | sed 's/\b\w/\u&/g')
              echo "| $name | $purpose | $automerge rules | $labels |" >> README.md
            fi
          done

          {
            echo ""
            echo "---"
            echo "*Documentation auto-generated on $(date)*"
          } >> README.md

          # Add Minimum Release Age section from default.json
          if command -v python3 &>/dev/null && [ -f default.json ]; then
            python3 -c "
          import json, sys
          try:
              with open('default.json') as f:
                  cfg = json.load(f)
          except (json.JSONDecodeError, IOError) as e:
              print(f'Warning: Could not parse default.json: {e}', file=sys.stderr)
              sys.exit(0)
          age = cfg.get('minimumReleaseAge')
          behaviour = cfg.get('minimumReleaseAgeBehaviour')
          checks = cfg.get('internalChecksFilter')
          if age:
              lines = [
                  '',
                  '## 🔒 Minimum Release Age',
                  '',
                  'The default preset enforces a **{}** minimum release age with strict security settings:'.format(age),
                  '',
                  '| Option | Value |',
                  '|--------|-------|',
                  '| \`minimumReleaseAge\` | \`{}\` |'.format(age),
              ]
              if behaviour:
                  lines.append('| \`minimumReleaseAgeBehaviour\` | \`{}\` |'.format(behaviour))
              if checks:
                  lines.append('| \`internalChecksFilter\` | \`{}\` |'.format(checks))
              lines.append('')
              lines.append('> **Note** : Security updates bypass minimumReleaseAge.')
              # Insert before the --- line
              with open('README.md') as f:
                  content = f.read()
              idx = content.rfind('\n---\n')
              if idx >= 0:
                  content = content[:idx] + '\n'.join(lines) + '\n' + content[idx:]
              with open('README.md', 'w') as f:
                  f.write(content)
          "
          fi

      - name: Commit Documentation
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: update documentation [skip ci]"
          git push
