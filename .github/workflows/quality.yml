name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  quality:
    uses: trowaflo/github-actions/.github/workflows/quality.yml@6a63db6e37aeb8c1b1f6fae52c5f49c027058fc3 # v1.0.0
    with:
      enable_gitleaks: true
      enable_checkov: true
      enable_actionlint: true
      enable_markdown_lint: true
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
