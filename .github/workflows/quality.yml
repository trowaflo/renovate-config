name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  quality:
    uses: trowaflo/github-actions/.github/workflows/quality.yml@330d42c2b9d0601afce55c12df2d83222f17a1c6 # fix/actionlint-checksums-and-ci-permissions
    with:
      enable_gitleaks: true
      enable_checkov: true
      enable_actionlint: true
      enable_markdown_lint: true
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
