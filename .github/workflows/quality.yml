name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  quality:
    uses: trowaflo/github-actions/.github/workflows/quality.yml@6f27522902d74162ae7493a5d7cddf64891659bb # fix/actionlint-checksums-and-ci-permissions
    with:
      enable_gitleaks: true
      enable_checkov: true
      enable_actionlint: true
      enable_markdown_lint: true
      enable_kics: true
      enable_trivy: true
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
