name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  quality:
    uses: trowaflo/github-actions/.github/workflows/quality.yml@2d0b298720218d3d12a39e59dcbdfbe6bcd39fa5 # PR#29 fix/deep-review-findings
    with:
      enable_gitleaks: true
      enable_checkov: true
      enable_actionlint: true
      enable_markdown_lint: true
      enable_json_lint: true
      enable_kics: true
      enable_trivy: true
    permissions:
      contents: write
      pull-requests: write
      security-events: write
